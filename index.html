<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>我的个人导航站</title>
    <style>
        /* ========== 全局重置 & 背景 ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', sans-serif;
            color: #fff;
            background-image: url('https://images.unsplash.com/photo-1506744038136-46273834b3fb?auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.3);
            z-index: -1;
        }

        /* ========== 页面内容容器 ========== */
        .page-content {
            display: block;
            padding: 80px 0 20px;
            max-width: 60%;
            margin: auto;
        }

        /* ========== 动画 ========== */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .animate-fade-in {
            opacity: 0;
            animation: fadeInUp 0.6s ease forwards;
        }
        .delay-1 {
            animation-delay: 0.1s;
        }
        .delay-2 {
            animation-delay: 0.2s;
        }
        .delay-3 {
            animation-delay: 0.3s;
        }

        /* ========== 欢迎区域 ========== */
        .welcome-section {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px 0;
        }
        .current-time {
            font-size: 48px;
            font-weight: 700;
            letter-spacing: 2px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
            margin-bottom: 10px;
        }
        .greeting-text {
            font-size: 20px;
            color: #e0e0e0;
            margin-bottom: 25px;
        }

        /* ========== 搜索引擎 ========== */
        .search-engine-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            max-width: 600px;
            margin: 0 auto;
        }
        .engine-select-wrapper {
            position: relative;
            margin-right: 10px;
        }
        .engine-select {
            appearance: none;
            padding: 12px 35px 12px 15px;
            border-radius: 25px;
            border: none;
            outline: none;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(5px);
            color: #fff;
            transition: 0.3s;
            min-width: 90px;
            text-align: center;
        }
        .engine-select option {
            background: #333;
            color: #fff;
        }
        .engine-select:hover,
        .engine-select:focus {
            background: rgba(255, 255, 255, 0.3);
        }
        .select-arrow {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            width: 14px;
            color: #ddd;
            pointer-events: none;
        }
        .main-search-box {
            flex: 1;
            padding: 12px 20px;
            border-radius: 25px;
            border: none;
            outline: none;
            font-size: 16px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(5px);
            color: #fff;
            transition: 0.3s;
        }
        .main-search-box::placeholder {
            color: #ddd;
        }
        .main-search-box:focus {
            background: rgba(255, 255, 255, 0.3);
            box-shadow: 0 0 15px rgba(74, 144, 226, 0.4);
        }

        /* ========== 我的最爱 ========== */
        .quick-links-title {
            font-size: 16px;
            color: #ffd700;
            margin: 40px 0 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
        }
        .quick-links-grid {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        .quick-link-card {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 16px 8px 8px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(5px);
            border-radius: 30px;
            text-decoration: none;
            color: #fff;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .quick-link-card:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-3px);
            border-color: #4a90e2;
        }
        .quick-link-card img {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: #fff;
        }

        /* ========== 分类面板（手风琴） ========== */
        .accordion-category {
            margin-bottom: 15px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            overflow: hidden;
        }
        .accordion-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            cursor: pointer;
        }
        .category-title {
            font-size: 16px;
            font-weight: bold;
            color: #8bb8ff;
        }
        .header-actions {
            display: flex;
            gap: 10px;
        }
        .action-btn {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            transition: transform 0.2s;
            color: white;
        }
        .action-btn:hover {
            transform: scale(1.1);
        }
        .btn-add {
            background: #48bb78;
        }
        .btn-manage {
            background: #ecc94b;
            color: #333;
        }
        .btn-arrow {
            background: transparent;
            color: #8bb8ff;
            transform: none !important;
        }
        .accordion-category.active .btn-arrow {
            transform: rotate(180deg) !important;
        }

        .accordion-body {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease;
        }
        .accordion-category.active .accordion-body {
            max-height: 1000px;
        }

        /* ========== 链接卡片网格 ========== */
        .link-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 12px;
            padding: 10px 20px 20px;
        }
        .link-card {
            background: rgba(255, 255, 255, 0.85);
            padding: 10px;
            border-radius: 8px;
            text-decoration: none;
            color: #333;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.5);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 10px;
            width: 100%;
            cursor: pointer;
        }
        .link-card:hover {
            transform: translateY(-4px) scale(1.02);
            background: #fff;
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.2);
            border-color: #4a90e2;
        }
        .link-card img {
            width: 28px;
            height: 28px;
            min-width: 28px;
            border-radius: 6px;
            object-fit: cover;
            background: #eee;
        }
        .link-card-text h4 {
            font-size: 13px;
            font-weight: bold;
            margin-bottom: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .link-card-text p {
            font-size: 11px;
            color: #666;
            line-height: 1.3;
            word-break: break-all;
        }

        /* ========== 工具栏 ========== */
        .toolbar {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }
        .toolbar button {
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            padding: 6px 14px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
            transition: 0.3s;
        }
        .toolbar button:hover {
            background: rgba(255, 255, 255, 0.3);
        }
        #importFileInput {
            display: none;
        }

        /* ========== 弹窗（通用） ========== */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            z-index: 200;
            display: none;
            justify-content: center;
            align-items: center;
        }
        .modal-box {
            background: #222;
            padding: 30px;
            border-radius: 12px;
            width: 400px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            max-height: 80vh;
            overflow-y: auto;
        }
        .modal-box h3 {
            margin-bottom: 20px;
            font-size: 18px;
        }
        .modal-box input,
        .modal-box select {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border-radius: 6px;
            border: 1px solid #444;
            background: #333;
            color: #fff;
            outline: none;
            box-sizing: border-box;
        }
        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 20px;
        }
        .modal-actions button {
            padding: 8px 16px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-size: 14px;
        }
        .btn-cancel {
            background: #444;
            color: #fff;
        }
        .btn-save {
            background: #4a90e2;
            color: #fff;
        }

        /* ========== 管理列表 ========== */
        .manage-list {
            list-style: none;
        }
        .manage-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 6px;
            margin-bottom: 10px;
        }
        .manage-item-info {
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 1;
            overflow: hidden;
        }
        .manage-item-info img {
            width: 20px;
            height: 20px;
            border-radius: 4px;
        }
        .manage-item-info span {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-size: 14px;
        }
        .manage-item-actions button {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 14px;
            margin-left: 10px;
        }
        .btn-edit {
            color: #ecc94b;
        }
        .btn-del {
            color: #e53e3e;
        }
    </style>
</head>
<body>

    <!-- 导航栏占位 -->
    <div id="nav-placeholder"></div>

    <!-- ======== 首页内容 ======== -->
    <div id="home" class="page-content">

        <!-- 欢迎区域 -->
        <div class="welcome-section animate-fade-in delay-1">
            <div class="current-time" id="currentTime"></div>
            <div class="greeting-text" id="greetingText"></div>
        </div>

        <!-- 搜索引擎 -->
        <div class="search-engine-wrapper animate-fade-in delay-2">
            <div class="engine-select-wrapper">
                <select id="engineSelect" class="engine-select">
                    <option value="baidu">百度</option>
                    <option value="bing">必应</option>
                    <option value="zhihu">知乎</option>
                </select>
                <svg class="select-arrow" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
            </div>
            <input type="text" class="main-search-box" id="mainSearchBox" placeholder="输入关键词，按回车搜索全网..." />
        </div>

        <!-- 我的最爱 -->
        <div class="animate-fade-in delay-3">
            <div class="quick-links-title">
                <span>⭐ 我的最爱</span>
                <button class="action-btn btn-manage" onclick="openFavManage()" style="font-size:12px; padding:4px 12px; border-radius:20px; width:auto;">管理</button>
            </div>
            <div class="quick-links-grid" id="quickLinksContainer"></div>
        </div>

        <!-- 分类导航 -->
        <div class="animate-fade-in delay-3">
            <div style="display:flex; justify-content:space-between; align-items:center; margin: 10px 0 15px; flex-wrap:wrap; gap:10px;">
                <h2 style="text-align:left;">📌 常用网址导航</h2>
                <div class="toolbar">
                    <button onclick="addCategory()">+ 添加分类</button>
                    <button onclick="exportData()">📤 导出</button>
                    <button onclick="document.getElementById('importFileInput').click()">📥 导入</button>
                    <input type="file" id="importFileInput" accept=".json" onchange="importData(event)" />
                </div>
            </div>
            <div id="linkContainer"></div>
        </div>
    </div>

    <!-- ======== 弹窗：添加/编辑网址 ======== -->
    <div class="modal-overlay" id="urlModal">
        <div class="modal-box">
            <h3 id="modalTitle">添加新网址</h3>
            <input type="text" id="modalName" placeholder="网站名称" />
            <input type="text" id="modalUrl" placeholder="网址链接 (https://...)" />
            <select id="modalCategory"></select>
            <div class="modal-actions">
                <button class="btn-cancel" onclick="closeUrlModal()">取消</button>
                <button class="btn-save" onclick="saveUrl()">保存</button>
            </div>
        </div>
    </div>

    <!-- ======== 弹窗：管理分类 ======== -->
    <div class="modal-overlay" id="manageModal">
        <div class="modal-box">
            <h3 id="manageModalTitle">管理分类</h3>
            <ul id="manageList" class="manage-list"></ul>
            <div class="modal-actions">
                <button class="btn-save" onclick="closeManageModal()">关闭</button>
            </div>
        </div>
    </div>

    <!-- ======== 弹窗：管理最爱 ======== -->
    <div class="modal-overlay" id="favModal">
        <div class="modal-box">
            <h3>管理我的最爱</h3>
            <ul id="favList" class="manage-list"></ul>
            <div style="display:flex; gap:10px; margin-top:10px; flex-wrap:wrap;">
                <input type="text" id="favName" placeholder="名称" style="flex:1; min-width:80px;" />
                <input type="text" id="favUrl" placeholder="网址" style="flex:2; min-width:120px;" />
                <input type="text" id="favIcon" placeholder="图标URL(可选)" style="flex:2; min-width:120px;" />
                <button class="btn-save" onclick="addFavItem()">添加</button>
            </div>
            <div class="modal-actions">
                <button class="btn-save" onclick="closeFavModal()">关闭</button>
            </div>
        </div>
    </div>

    <!-- ======== JavaScript ======== -->
    <script>
        // ============================================================
        // 1. 时间与问候
        // ============================================================
        function updateClockAndGreeting() {
            const now = new Date();
            const hours = now.getHours();
            const dateStr = now.toLocaleDateString('zh-CN', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' });
            const timeStr = now.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit', hour12: false });
            document.getElementById('currentTime').textContent = `${dateStr} ${timeStr}`;
            let greeting = hours >= 5 && hours < 12 ? "🌅 早上好，新的一天，今天想探索点什么？" :
                hours >= 12 && hours < 18 ? "☕ 下午好，别忘了喝杯水休息一下哦~" :
                "🌙 晚上好，夜深了，祝你有个愉快的夜晚！";
            document.getElementById('greetingText').textContent = greeting;
        }
        updateClockAndGreeting();
        setInterval(updateClockAndGreeting, 1000);

        // ============================================================
        // 2. 搜索引擎
        // ============================================================
        const engines = {
            baidu: "https://www.baidu.com/s?wd=",
            bing: "https://www.bing.com/search?q=",
            zhihu: "https://www.zhihu.com/search?type=content&q="
        };
        document.getElementById('mainSearchBox').addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && this.value.trim() !== "") {
                window.open(engines[document.getElementById('engineSelect').value] + encodeURIComponent(this.value.trim()), '_blank');
            }
        });

        // ============================================================
        // 3. 我的最爱 数据管理
        // ============================================================
        function getFavorites() {
            return JSON.parse(localStorage.getItem('myFavorites')) || [
                { name: "微信网页版", url: "https://wx.qq.com", icon: "https://res.wx.qq.com/a/wx_fed/webwx/res/static/img/2zrdCI1.png" },
                { name: "哔哩哔哩", url: "https://www.bilibili.com", icon: "https://www.bilibili.com/favicon.ico" },
                { name: "网易云音乐", url: "https://music.163.com", icon: "https://s1.music.126.net/style/favicon.ico" }
            ];
        }

        function saveFavorites(data) {
            localStorage.setItem('myFavorites', JSON.stringify(data));
            renderFavorites();
        }

        function renderFavorites() {
            const container = document.getElementById('quickLinksContainer');
            const data = getFavorites();
            container.innerHTML = '';
            data.forEach(link => {
                const a = document.createElement('a');
                a.href = link.url;
                a.target = '_blank';
                a.className = 'quick-link-card';
                a.innerHTML = `<img src="${link.icon}" alt="${link.name}" onerror="this.src='https://via.placeholder.com/24'"> ${link.name}`;
                container.appendChild(a);
            });
        }

        // ----- 管理最爱弹窗 -----
        function openFavManage() {
            const modal = document.getElementById('favModal');
            const list = document.getElementById('favList');
            const data = getFavorites();
            list.innerHTML = '';
            data.forEach((item, idx) => {
                const li = document.createElement('li');
                li.className = 'manage-item';
                li.innerHTML = `
                    <div class="manage-item-info">
                        <img src="${item.icon || 'https://via.placeholder.com/20'}" onerror="this.src='https://via.placeholder.com/20'">
                        <span>${item.name}</span>
                        <span style="font-size:12px;color:#888;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:120px;">${item.url}</span>
                    </div>
                    <div class="manage-item-actions">
                        <button class="btn-del" onclick="deleteFav(${idx})">🗑️</button>
                    </div>
                `;
                list.appendChild(li);
            });
            modal.style.display = 'flex';
        }

        function closeFavModal() {
            document.getElementById('favModal').style.display = 'none';
        }

        function deleteFav(idx) {
            if (confirm('确定删除？')) {
                const data = getFavorites();
                data.splice(idx, 1);
                saveFavorites(data);
                openFavManage();
            }
        }

        function addFavItem() {
            const name = document.getElementById('favName').value.trim();
            const url = document.getElementById('favUrl').value.trim();
            const icon = document.getElementById('favIcon').value.trim();
            if (!name || !url) { alert('名称和网址不能为空'); return; }
            const data = getFavorites();
            data.push({ name, url: url.startsWith('http') ? url : 'https://' + url, icon: icon || '' });
            saveFavorites(data);
            document.getElementById('favName').value = '';
            document.getElementById('favUrl').value = '';
            document.getElementById('favIcon').value = '';
            openFavManage();
        }

        // ============================================================
        // 4. 网址分类 数据管理
        // ============================================================
        const defaultData = [
            { name: "开发工具", active: true, links: [
                    { name: "GitHub", url: "https://github.com", icon: "https://github.githubassets.com/favicons/favicon-dark.png" },
                    { name: "Stack Overflow", url: "https://stackoverflow.com", icon: "https://cdn.sstatic.net/Sites/stackoverflow/Img/favicon.ico?v=ec617d715196" }
                ] },
            { name: "设计素材", active: true, links: [
                    { name: "Unsplash", url: "https://unsplash.com", icon: "https://unsplash.com/favicon-32x32.png" },
                    { name: "Figma", url: "https://www.figma.com", icon: "https://static.figma.com/app/icon/1/favicon.png" }
                ] }
        ];

        function getData() {
            return JSON.parse(localStorage.getItem('myNavLinks')) || defaultData;
        }

        function saveData(data) {
            localStorage.setItem('myNavLinks', JSON.stringify(data));
            renderCategories();
        }

        function getFavicon(url) {
            try { return new URL(url).origin + '/favicon.ico'; } catch (e) { return ''; }
        }

        // ----- 渲染分类（手风琴） -----
        function renderCategories() {
            const data = getData();
            const container = document.getElementById('linkContainer');
            container.innerHTML = '';
            data.forEach((cat, catIndex) => {
                const accordion = document.createElement('div');
                accordion.className = `accordion-category ${cat.active ? 'active' : ''}`;
                accordion.innerHTML = `
                    <div class="accordion-header">
                        <div class="category-title">${cat.name} (${cat.links.length})</div>
                        <div class="header-actions">
                            <button class="action-btn btn-add" onclick="openUrlModal(${catIndex}, -1)" title="添加网址">+</button>
                            <button class="action-btn btn-manage" onclick="openManageModal(${catIndex})" title="管理分类">⚙️</button>
                            <button class="action-btn btn-arrow" onclick="toggleCategory(${catIndex})">▼</button>
                        </div>
                    </div>
                    <div class="accordion-body">
                        <div class="link-grid">
                            ${cat.links.map((link, linkIndex) => `
                                <a href="${link.url}" target="_blank" class="link-card">
                                    <img src="${link.icon || getFavicon(link.url)}" alt="${link.name}" onerror="this.src='https://via.placeholder.com/28'">
                                    <div class="link-card-text">
                                        <h4>${link.name}</h4>
                                        <p>${link.url}</p>
                                    </div>
                                </a>
                            `).join('')}
                        </div>
                    </div>
                `;
                container.appendChild(accordion);
            });
        }

        function toggleCategory(index) {
            const data = getData();
            data[index].active = !data[index].active;
            saveData(data);
        }

        // ----- 添加分类 -----
        function addCategory() {
            const name = prompt('请输入新分类名称：');
            if (name && name.trim()) {
                const data = getData();
                data.push({ name: name.trim(), active: true, links: [] });
                saveData(data);
            }
        }

        // ============================================================
        // 5. 添加/编辑网址 弹窗
        // ============================================================
        let currentCatIndex = null;
        let currentLinkIndex = null;

        function openUrlModal(catIndex, linkIndex) {
            currentCatIndex = catIndex;
            currentLinkIndex = linkIndex;

            const modal = document.getElementById('urlModal');
            const title = document.getElementById('modalTitle');
            const nameInput = document.getElementById('modalName');
            const urlInput = document.getElementById('modalUrl');
            const categorySelect = document.getElementById('modalCategory');

            // 填充分类下拉
            categorySelect.innerHTML = '';
            const data = getData();
            data.forEach((cat, i) => {
                const option = document.createElement('option');
                option.value = i;
                option.textContent = cat.name;
                categorySelect.appendChild(option);
            });

            if (linkIndex === -1) {
                title.textContent = "添加新网址";
                nameInput.value = "";
                urlInput.value = "";
                categorySelect.value = catIndex;
            } else {
                title.textContent = "编辑网址";
                const link = data[catIndex].links[linkIndex];
                nameInput.value = link.name;
                urlInput.value = link.url;
                categorySelect.value = catIndex;
            }
            modal.style.display = 'flex';
        }

        function closeUrlModal() {
            document.getElementById('urlModal').style.display = 'none';
        }

        function saveUrl() {
            const name = document.getElementById('modalName').value.trim();
            const url = document.getElementById('modalUrl').value.trim();
            const targetCatIndex = parseInt(document.getElementById('modalCategory').value);

            if (!name || !url) { alert('名称和网址不能为空'); return; }

            const data = getData();
            const finalUrl = url.startsWith('http') ? url : 'https://' + url;
            const newLink = { name, url: finalUrl, icon: getFavicon(finalUrl), createdAt: Date.now()};

            if (currentLinkIndex === -1) {
                data[targetCatIndex].links.push(newLink);
            } else {
                if (targetCatIndex !== currentCatIndex) {
                    data[currentCatIndex].links.splice(currentLinkIndex, 1);
                    data[targetCatIndex].links.push(newLink);
                } else {
                    data[currentCatIndex].links[currentLinkIndex] = newLink;
                }
            }
            saveData(data);
            closeUrlModal();
        }

        // ============================================================
        // 6. 管理分类 弹窗
        // ============================================================
        function openManageModal(catIndex) {
            currentCatIndex = catIndex;
            const data = getData();
            const modal = document.getElementById('manageModal');
            const title = document.getElementById('manageModalTitle');
            const list = document.getElementById('manageList');

            title.textContent = `管理分类: ${data[catIndex].name}`;
            list.innerHTML = '';

            if (data[catIndex].links.length === 0) {
                list.innerHTML = '<li style="text-align:center; color:#888; padding:20px;">该分类下暂无网址</li>';
            } else {
                data[catIndex].links.forEach((link, linkIndex) => {
                    const li = document.createElement('li');
                    li.className = 'manage-item';
                    li.innerHTML = `
                        <div class="manage-item-info">
                            <img src="${link.icon || getFavicon(link.url)}" onerror="this.src='https://via.placeholder.com/20'">
                            <span>${link.name}</span>
                        </div>
                        <div class="manage-item-actions">
                            <button class="btn-edit" onclick="closeManageModal(); openUrlModal(${catIndex}, ${linkIndex})">✏️</button>
                            <button class="btn-del" onclick="deleteUrl(${catIndex}, ${linkIndex})">🗑️</button>
                        </div>
                    `;
                    list.appendChild(li);
                });
            }
            modal.style.display = 'flex';
        }

        function closeManageModal() {
            document.getElementById('manageModal').style.display = 'none';
        }

        function deleteUrl(catIndex, linkIndex) {
            if (confirm('确定要删除这个网址吗？')) {
                const data = getData();
                data[catIndex].links.splice(linkIndex, 1);
                saveData(data);
                openManageModal(catIndex);
            }
        }

        // ============================================================
        // 7. 数据导出 / 导入
        // ============================================================
        function exportData() {
            const data = getData();
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'myNavData.json';
            a.click();
            URL.revokeObjectURL(a.href);
        }

        function importData(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const imported = JSON.parse(e.target.result);
                    if (Array.isArray(imported)) {
                        if (confirm('将覆盖当前所有分类数据，确认？')) {
                            saveData(imported);
                            alert('导入成功！');
                        }
                    } else {
                        alert('数据格式不正确');
                    }
                } catch (err) {
                    alert('解析JSON失败');
                }
            };
            reader.readAsText(file);
            event.target.value = '';
        }

        // ============================================================
        // 8. 点击弹窗外部关闭
        // ============================================================
        window.onclick = function(event) {
            if (event.target == document.getElementById('urlModal')) closeUrlModal();
            if (event.target == document.getElementById('manageModal')) closeManageModal();
            if (event.target == document.getElementById('favModal')) closeFavModal();
        };

        // ============================================================
        // 9. 初始化
        // ============================================================
        renderFavorites();
        renderCategories();
    </script>

    <!-- 引入导航栏 -->
    <script src="nav.js"></script>
</body>
</html>
